<!DOCTYPE html>
<html lang="ru">

<head>
  <meta charset="UTF-8">
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >
  <title>Калькулятор ламината</title>
  <style>
    :root {
      --primary: #10b981;
    }

    * {
      box-sizing: border-box;
    }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background-color: #f8fafc;
      margin: 0;
      padding: 16px;
      line-height: 1.5;
    }

    .container {
      max-width: 820px;
      margin: 0 auto;
      background: white;
      border-radius: 24px;
      box-shadow: 0 15px 40px rgba(0, 0, 0, 0.1);
      overflow: hidden;
    }

    header {
      background: linear-gradient(135deg, #10b981, #059669);
      color: white;
      padding: 30px 20px;
      text-align: center;
    }

    h1 {
      margin: 0;
      font-size: 2.1rem;
      font-weight: 700;
    }

    .content {
      padding: 35px 25px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-weight: 600;
      color: #374151;
    }

    input {
      width: 100%;
      padding: 14px 18px;
      border: 2px solid #e5e7eb;
      border-radius: 14px;
      font-size: 1.08rem;
    }

    .input-group {
      margin-bottom: 24px;
    }

    .panel {
      margin-top: 28px;
      padding: 26px;
      background: #f8fafc;
      border-radius: 18px;
      border: 1px solid #e5e7eb;
    }

    .result {
      margin-top: 32px;
      padding: 28px;
      background: #ecfdf5;
      border-radius: 18px;
      text-align: center;
      border: 2px solid #a7f3d0;
    }

    .result-label {
      font-size: 1.1rem;
      color: #374151;
      margin-bottom: 8px;
    }

    .result-value {
      font-size: 2.6rem;
      font-weight: 700;
      color: var(--primary);
    }

    .percent-btn {
      padding: 12px 22px;
      margin: 0 5px;
      border: none;
      border-radius: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    .percent-btn.active {
      background: #10b981;
      color: white;
    }

    .nav-link {
      display: block;
      margin: 15px 0 30px;
      padding: 14px 28px;
      background: #10b981;
      color: white;
      text-decoration: none;
      border-radius: 12px;
      font-weight: 600;
      font-size: 1.1rem;
      text-align: center;
    }

    .nav-link:hover {
      background: #059669;
    }

    @media (max-width: 640px) {
      h1 {
        font-size: 1.9rem;
      }

      .result-value {
        font-size: 2.3rem;
      }
    }
  </style>
</head>

<body>

  <div class="container">
    <header>
      <h1>Калькулятор ламината</h1>
    </header>

    <div class="content">
      <!-- Навигация вверху -->
      <a
        href="index.html"
        class="nav-link"
      >← Вернуться к калькулятору линолеума</a>

      <div class="input-group">
        <label>Примерное количество ламината (м²)</label>
        <input
          type="number"
          id="baseNeeded"
          step="0.01"
          placeholder="Например: 32.5"
        >
      </div>

      <div class="input-group">
        <label>м² в одной упаковке</label>
        <input
          type="number"
          id="packM2"
          step="0.01"
          placeholder="Например: 2.0"
        >
      </div>

      <div class="input-group">
        <label>Досок в одной упаковке</label>
        <input
          type="number"
          id="boardsPerPack"
          placeholder="Например: 8"
        >
      </div>

      <div class="input-group">
        <label>Цена за м² (₽)</label>
        <input
          type="number"
          id="pricePerM2"
          placeholder="Например: 1250"
        >
      </div>

      <div style="margin: 25px 0 35px;">
        <label>Добавить запас на подгонку:</label><br><br>
        <button
          id="btn0"
          class="percent-btn active"
        >0% (без запаса)</button>
        <button
          id="btn5"
          class="percent-btn"
        >+5%</button>
        <button
          id="btn10"
          class="percent-btn"
        >+10%</button>
        <button
          id="btn15"
          class="percent-btn"
        >+15%</button>
      </div>

      <div
        id="resultPanel"
        class="panel"
      >
        <div class="result">
          <div class="result-label">Точная квадратура к покупке</div>
          <div
            id="totalArea"
            class="result-value"
          >0.000 м²</div>
        </div>

        <div style="margin-top:20px; display:grid; grid-template-columns:1fr 1fr; gap:16px; text-align:center;">
          <div>
            <div class="result-label">Целых упаковок</div>
            <div
              id="fullPacks"
              style="font-size:2.2rem; font-weight:700;"
            >0</div>
          </div>
          <div>
            <div class="result-label">Отдельных досок</div>
            <div
              id="extraBoards"
              style="font-size:2.2rem; font-weight:700;"
            >0</div>
          </div>
        </div>

        <div
          class="result"
          style="margin-top:25px;"
        >
          <div class="result-label">Общая стоимость</div>
          <div
            id="totalPrice"
            class="result-value"
          >0 ₽</div>
        </div>
      </div>
    </div>

    <footer style="display:flex;flex-direction:column;justify-content:center;align-items:center;padding:25px 0 35px;">
      <img
        src="./qr-code.png"
        alt="qr-code"
      >
      <p style="margin:15px 0 0;">
        <a
          href="https://alexandrbur.github.io/"
          style="font-weight:600;font-size:1.25rem;color:#0277BD;text-decoration:none;"
        >alexandrbur.github.io</a>
      </p>
    </footer>
  </div>

  <script>
    const baseInput = document.getElementById('baseNeeded');
    const packM2Input = document.getElementById('packM2');
    const boardsInput = document.getElementById('boardsPerPack');
    const priceInput = document.getElementById('pricePerM2');

    let extraPercent = 0;   // изначально 0%

    function calculate() {
      const base = parseFloat(baseInput.value) || 0;
      const packM2 = parseFloat(packM2Input.value) || 0;
      const boardsPerPack = parseFloat(boardsInput.value) || 0;
      const pricePerM2 = parseFloat(priceInput.value) || 0;

      if (base <= 0 || packM2 <= 0 || boardsPerPack <= 0 || pricePerM2 <= 0) {
        document.getElementById('totalArea').textContent = '0.000 м²';
        document.getElementById('fullPacks').textContent = '0';
        document.getElementById('extraBoards').textContent = '0';
        document.getElementById('totalPrice').textContent = '0 ₽';
        return;
      }

      const needed = base * (1 + extraPercent / 100);
      const boardM2 = packM2 / boardsPerPack;
      const totalBoardsNeeded = Math.ceil(needed / boardM2);

      const fullPacks = Math.floor(totalBoardsNeeded / boardsPerPack);
      let extraBoards = totalBoardsNeeded % boardsPerPack;

      const packsToBuy = fullPacks + (extraBoards > 0 ? 1 : 0);

      // Реальная квадратура к покупке
      const exactArea = (fullPacks * packM2) + (extraBoards * boardM2);

      const totalPrice = Math.round(exactArea * pricePerM2);

      document.getElementById('totalArea').textContent = exactArea.toFixed(3) + ' м²';
      document.getElementById('fullPacks').textContent = fullPacks;
      document.getElementById('extraBoards').textContent = extraBoards || 0;
      document.getElementById('totalPrice').textContent = totalPrice.toLocaleString('ru-RU') + ' ₽';
    }

    // Обновление при вводе в любое поле
    [baseInput, packM2Input, boardsInput, priceInput].forEach(input => {
      input.addEventListener('input', calculate);
    });

    // Обработка кнопок процентов
    function setPercent(percent) {
      if (extraPercent === percent) {
        extraPercent = 0;                    // повторное нажатие = отключить
      } else {
        extraPercent = percent;
      }

      // Обновляем активные кнопки
      document.querySelectorAll('.percent-btn').forEach(btn => {
        btn.classList.toggle('active', parseFloat(btn.dataset.percent) === extraPercent);
      });

      calculate();
    }

    // Присваиваем data-percent и вешаем обработчики
    document.getElementById('btn0').dataset.percent = 0;
    document.getElementById('btn5').dataset.percent = 5;
    document.getElementById('btn10').dataset.percent = 10;
    document.getElementById('btn15').dataset.percent = 15;

    document.getElementById('btn0').addEventListener('click', () => setPercent(0));
    document.getElementById('btn5').addEventListener('click', () => setPercent(5));
    document.getElementById('btn10').addEventListener('click', () => setPercent(10));
    document.getElementById('btn15').addEventListener('click', () => setPercent(15));

    // Изначально показываем 0% активным
    document.getElementById('btn0').classList.add('active');
  </script>
</body>

</html>
